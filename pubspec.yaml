name: trip_marche
description: "Trip Marche - Travel Trip Marketplace"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17
  sizer: ^2.0.15
  carousel_slider: ^5.0.0
  cached_network_image: ^3.4.1
  flutter_staggered_animations: ^1.1.1
  iconsax: ^0.0.8
  smooth_page_indicator: ^1.2.0+3
  flutter_rating_bar: ^4.0.1
  readmore: ^3.0.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/

