name: trip_marche
description: "Trip Marche - Travel Trip Marketplace"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  adaptive_theme: ^3.6.0
  animate_do: ^4.2.0
  animated_custom_dropdown: ^3.1.1
  cached_network_image: ^3.4.1
  carousel_slider: ^5.1.1
  dartz: ^0.10.1
  dio: ^5.7.0
  equatable: ^2.0.7
  font_awesome_flutter: ^10.7.0
  file_picker: ^10.2.0
  flutter:
    sdk: flutter
  flutter_animate: ^4.5.2
  flutter_bloc: ^9.1.0
  flutter_image_compress: ^2.3.0
  flutter_screenutil: ^5.9.3
  flutter_svg: ^2.0.16
  get_it: ^8.0.2
  haptic_feedback: ^0.5.1+1
  hive: ^2.0.4
  hive_flutter: ^1.1.0
  http_parser: ^4.1.2
  iconsax: ^0.0.8
  image_picker: ^1.1.2
  in_app_update: ^4.2.5
  intl: ^0.20.2
  lottie: ^3.1.3
  mime: ^2.0.0
  package_info_plus: ^9.0.0
  path: ^1.9.0
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  pin_code_fields: ^8.0.1
  pretty_dio_logger: ^1.4.0
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  smooth_page_indicator: ^2.0.1
  readmore: ^3.0.0
  url_launcher: ^6.3.2
  uuid: ^4.5.1
  country_code_picker: ^3.4.1
  webview_flutter: ^4.10.0
  photo_view: ^0.15.0
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  flutter_staggered_grid_view: ^0.7.0

dev_dependencies:
  build_runner: ^2.1.2
  flutter_launcher_icons: ^0.14.3
  flutter_lints: ^5.0.0
  flutter_localizations:
    sdk: flutter
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon_bg.png"
  adaptive_icon_background: "#9B36D5"
  adaptive_icon_foreground: "assets/icons/llo.png"
  remove_alpha_ios: true

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/
    - assets/translation/
